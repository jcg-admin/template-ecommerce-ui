<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO base -->
  <title>e-comerce-ui — Generic e-commerce frontend</title>
  <meta name="description"
        content="Plantilla de e-commerce para productos físicos. Sustituir esta descripción al adoptar." />

  <!-- Security -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="e-comerce-ui" />
  <meta property="og:title"       content="e-comerce-ui" />
  <meta property="og:description" content="Generic e-commerce frontend" />

  <!-- Fonts: Playfair Display (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Favicon placeholder -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <!-- Preload del chunk principal -->
  <style>
    /* Estilos mínimos para FOUT (Flash of Unstyled Text) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #FAFAF7;
      color: #1C1008;
      -webkit-font-smoothing: antialiased;
    }
    #root { display: flex; flex-direction: column; min-height: 100vh; }
    /* Spinner inicial antes de que React hidrate */
    .initial-loader {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 16px;
    }
    .initial-spinner {
      width: 44px; height: 44px;
      border: 3px solid #E8E0D5;
      border-top-color: #B8860B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <!-- Loader inicial visible antes de que React cargue -->
    <div class="initial-loader" aria-label="Cargando aplicación">
      <div class="initial-spinner"></div>
    </div>
  </div>

  <noscript>
    <p style="text-align:center;padding:40px;color:#5C4A3A;">
      Por favor, habilita JavaScript para usar la aplicación.
    </p>
  </noscript>
</body>
</html>
